name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://shubhpatel91:$HF_TOKEN@huggingface.co/spaces/shubhpatel91/SolveX_AI_Intelligent_Math_And_Reasoning_Agent main
 --force
